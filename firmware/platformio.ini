; =============================================================================
;  platformio.ini  -  place this at xbotix-robot/firmware/
;
;  PlatformIO compiles every .cpp under src_dir recursively, so the modular
;  folders (main/ motor_control/ sensors/ communication/) all build. The -I
;  flags let any file include headers by bare name (e.g. #include "config.h").
;
;  Requires Arduino-ESP32 core v3.x for the 3-arg ledcAttach() signature.
;  Change `board` to match your actual ESP32 dev board.
; =============================================================================
[platformio]
src_dir = .

[env:esp32-s3-devkitc-1]
platform      = espressif32
board         = esp32-s3-devkitc-1
framework     = arduino
monitor_speed = 115200
build_flags =
    -I main
    -I sensors
    -I motor_control
    -I communication
